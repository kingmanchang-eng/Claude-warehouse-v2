name = "claude-warehouse-v2"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# Next.js 静态导出目录，Worker 直接托管
# run_worker_first = true 确保所有请求先经过 Worker，再决定是否服务静态文件
[assets]
directory = "../out"
binding = "ASSETS"
run_worker_first = true

[vars]
BACKEND_URL = "https://kcpvsulmbpbd.usw-1.sealos.app"
