<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background -->
  <rect width="32" height="32" rx="6" fill="#001f3f"/>
  <!-- Antenna stem -->
  <line x1="16" y1="7" x2="16" y2="4" stroke="#afc8f0" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Antenna dot -->
  <circle cx="16" cy="3" r="1.5" fill="#00daf3"/>
  <!-- Robot head -->
  <rect x="6" y="7" width="20" height="16" rx="3" fill="none" stroke="#afc8f0" stroke-width="1.5"/>
  <!-- Eyes -->
  <circle cx="11.5" cy="14" r="2.5" fill="#00daf3"/>
  <circle cx="20.5" cy="14" r="2.5" fill="#00daf3"/>
  <!-- Eye shine -->
  <circle cx="12.5" cy="13" r="0.8" fill="#ffffff" opacity="0.6"/>
  <circle cx="21.5" cy="13" r="0.8" fill="#ffffff" opacity="0.6"/>
  <!-- Mouth -->
  <rect x="11" y="19" width="10" height="2" rx="1" fill="#afc8f0"/>
</svg>
